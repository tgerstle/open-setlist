name: E2E and A11y Tests

on:
  workflow_dispatch:
  # Optional: Uncomment if you want to run this automatically on certain branches or pull requests
  # pull_request:
  #   paths:
  #     - 'apps/web/**'
  #     - 'packages/ui/**'

jobs:
  run-e2e:
    name: "E2E & Accessibility Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Run Setup Script (Installs deps & creates db)
        run: pnpm run setup

      - name: Install Playwright Browsers & Deps
        run: |
          pnpm --filter=@open-setlist/web exec playwright install --with-deps
          pnpm --filter=@open-setlist/scraper exec playwright install --with-deps

      - name: Build Monorepo
        run: pnpm turbo run build

      - name: Run Web Playwright E2E Tests
        run: pnpm --filter=@open-setlist/web run test:e2e

      - name: Setup Storybook & UI Tests (A11y)
        run: |
          pnpm --filter=@open-setlist/ui run build-storybook || echo "Warning: Storybook build skip if not setup yet"
          pnpm --filter=@open-setlist/ui run test:a11y:ci || echo "Warning: Storybook a11y skip if not setup yet"
